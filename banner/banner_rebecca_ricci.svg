<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <!-- Black background with subtle gold vignette -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a1208" stop-opacity="1"/>
      <stop offset="60%" stop-color="#080604" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
    </radialGradient>

    <!-- Premium gold gradient for names -->
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff1c2"/>
      <stop offset="25%" stop-color="#f5d77a"/>
      <stop offset="50%" stop-color="#d4a84a"/>
      <stop offset="75%" stop-color="#b8862e"/>
      <stop offset="100%" stop-color="#8a5e1a"/>
    </linearGradient>

    <!-- Gold gradient for decorative lines -->
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a5e1a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f5d77a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8a5e1a" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft fade where photo will sit (right side) -->
    <linearGradient id="photoFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>

    <!-- Soft glow filter for the names -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base black background -->
  <rect width="1500" height="500" fill="#000000"/>
  <rect width="1500" height="500" fill="url(#bgGlow)"/>

  <!-- Subtle gold sparkle dots, premium texture -->
  <g opacity="0.35">
    <circle cx="120" cy="80" r="1.2" fill="#f5d77a"/>
    <circle cx="280" cy="420" r="0.9" fill="#f5d77a"/>
    <circle cx="640" cy="60" r="1.1" fill="#f5d77a"/>
    <circle cx="50"  cy="260" r="0.8" fill="#f5d77a"/>
    <circle cx="700" cy="450" r="1.0" fill="#f5d77a"/>
    <circle cx="430" cy="40"  r="0.7" fill="#f5d77a"/>
    <circle cx="190" cy="180" r="0.6" fill="#f5d77a"/>
    <circle cx="560" cy="320" r="0.9" fill="#f5d77a"/>
    <circle cx="1380" cy="120" r="1.0" fill="#f5d77a"/>
    <circle cx="1280" cy="380" r="0.8" fill="#f5d77a"/>
    <circle cx="1450" cy="260" r="1.1" fill="#f5d77a"/>
  </g>

  <!-- Decorative gold corner ornaments -->
  <g stroke="#d4a84a" stroke-width="1.2" fill="none" opacity="0.7">
    <!-- top-left -->
    <path d="M 30 30 L 90 30 M 30 30 L 30 90"/>
    <path d="M 30 30 L 50 50" opacity="0.5"/>
    <!-- top-right -->
    <path d="M 1470 30 L 1410 30 M 1470 30 L 1470 90"/>
    <!-- bottom-left -->
    <path d="M 30 470 L 90 470 M 30 470 L 30 410"/>
    <!-- bottom-right -->
    <path d="M 1470 470 L 1410 470 M 1470 470 L 1470 410"/>
  </g>

  <!-- Subtle inner gold frame -->
  <rect x="20" y="20" width="1460" height="460" fill="none" stroke="#8a5e1a" stroke-width="0.8" opacity="0.45"/>

  <!-- =========== TEXT CONTENT (left half, centered around x=400) =========== -->

  <!-- Tiny eyebrow text above main title -->
  <text x="400" y="130"
        font-family="'Playfair Display', 'Didot', 'Times New Roman', serif"
        font-size="18" letter-spacing="14" font-weight="300"
        fill="#d4a84a" text-anchor="middle" opacity="0.9">
    PREMIUM  ·  FANSLY
  </text>

  <!-- MAIN TITLE: REBECCA & RICCI -->
  <text x="400" y="230"
        font-family="'Playfair Display', 'Didot', 'Bodoni 72', 'Times New Roman', serif"
        font-size="76" font-weight="400" letter-spacing="6"
        fill="url(#goldText)" text-anchor="middle"
        filter="url(#softGlow)">
    REBECCA <tspan font-style="italic" font-weight="300">&amp;</tspan> RICCI
  </text>

  <!-- Decorative line with "REAL COUPLE" -->
  <g>
    <line x1="180" y1="285" x2="320" y2="285" stroke="url(#goldLine)" stroke-width="1.2"/>
    <text x="400" y="292"
          font-family="'Playfair Display', 'Didot', serif"
          font-size="22" letter-spacing="10" font-weight="400"
          fill="#f5d77a" text-anchor="middle">
      REAL COUPLE
    </text>
    <line x1="480" y1="285" x2="620" y2="285" stroke="url(#goldLine)" stroke-width="1.2"/>
  </g>

  <!-- Tagline: Authentic · Explicit · Exclusive -->
  <text x="400" y="345"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="22" letter-spacing="6" font-weight="300"
        fill="#ffffff" text-anchor="middle" opacity="0.92">
    Authentic  ·  Explicit  ·  Exclusive
  </text>

  <!-- CTA Button-ish: UNLOCK EVERYTHING -->
  <g transform="translate(400, 410)">
    <!-- Gold pill button background -->
    <rect x="-160" y="-26" width="320" height="52" rx="26" ry="26"
          fill="none" stroke="url(#goldText)" stroke-width="1.5"/>
    <rect x="-160" y="-26" width="320" height="52" rx="26" ry="26"
          fill="#d4a84a" opacity="0.08"/>
    <text x="0" y="7"
          font-family="'Helvetica Neue', 'Arial', sans-serif"
          font-size="20" letter-spacing="6" font-weight="600"
          fill="url(#goldText)" text-anchor="middle">
      UNLOCK EVERYTHING
    </text>
  </g>

  <!-- =========== PHOTO PLACEHOLDER ZONE (right side) =========== -->
  <!-- This is just a guide - replace with your photo in Canva/Photoshop -->
  <g opacity="0.25">
    <rect x="820" y="60" width="620" height="380" rx="4"
          fill="none" stroke="#d4a84a" stroke-width="1" stroke-dasharray="6,6"/>
    <text x="1130" y="255"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="16" letter-spacing="4"
          fill="#d4a84a" text-anchor="middle" opacity="0.8">
      PLACE PHOTO HERE
    </text>
    <text x="1130" y="278"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="11" letter-spacing="2"
          fill="#d4a84a" text-anchor="middle" opacity="0.6">
      (remove this guide before export)
    </text>
  </g>

  <!-- Fade gradient on far right (blends photo into the design) -->
  <rect x="1100" y="0" width="400" height="500" fill="url(#photoFade)" opacity="0.0"/>

</svg>
