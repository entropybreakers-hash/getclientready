<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="55%" stop-color="#0a0805"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff1c2"/>
      <stop offset="25%" stop-color="#f5d77a"/>
      <stop offset="50%" stop-color="#d4a84a"/>
      <stop offset="75%" stop-color="#b8862e"/>
      <stop offset="100%" stop-color="#8a5e1a"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a5e1a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f5d77a"/>
      <stop offset="100%" stop-color="#8a5e1a" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1500" height="500" fill="#000000"/>
  <rect width="1500" height="500" fill="url(#bgGlow)"/>

  <g opacity="0.35" fill="#f5d77a">
    <circle cx="120" cy="80" r="1.2"/>
    <circle cx="280" cy="420" r="0.9"/>
    <circle cx="640" cy="60" r="1.1"/>
    <circle cx="50" cy="260" r="0.8"/>
    <circle cx="700" cy="450" r="1.0"/>
    <circle cx="430" cy="40" r="0.7"/>
    <circle cx="190" cy="180" r="0.6"/>
    <circle cx="560" cy="380" r="0.9"/>
    <circle cx="1380" cy="120" r="1.0"/>
    <circle cx="1280" cy="380" r="0.8"/>
    <circle cx="1450" cy="260" r="1.1"/>
    <circle cx="900" cy="70" r="0.9"/>
    <circle cx="1050" cy="440" r="1.0"/>
    <circle cx="1200" cy="180" r="0.7"/>
    <circle cx="850" cy="350" r="0.8"/>
  </g>

  <g stroke="#d4a84a" stroke-width="1.4" fill="none" opacity="0.75">
    <path d="M 30 30 L 95 30 M 30 30 L 30 95"/>
    <path d="M 1470 30 L 1405 30 M 1470 30 L 1470 95"/>
    <path d="M 30 470 L 95 470 M 30 470 L 30 405"/>
    <path d="M 1470 470 L 1405 470 M 1470 470 L 1470 405"/>
  </g>

  <rect x="22" y="22" width="1456" height="456" fill="none" stroke="#8a5e1a" stroke-width="0.7" opacity="0.4"/>

  <!-- Eyebrow -->
  <text x="750" y="135"
        font-family="DejaVu Serif, serif"
        font-size="18" letter-spacing="16" font-weight="400"
        fill="#d4a84a" text-anchor="middle" opacity="0.9">PREMIUM  ·  FANSLY</text>

  <!-- Main title - SINGLE text element, no tspan -->
  <text x="750" y="245"
        font-family="DejaVu Serif, serif"
        font-size="78" font-weight="400" letter-spacing="6"
        fill="url(#goldText)" text-anchor="middle"
        filter="url(#softGlow)">REBECCA &amp; RICCI</text>

  <!-- REAL COUPLE with lines -->
  <line x1="490" y1="298" x2="630" y2="298" stroke="url(#goldLine)" stroke-width="1.3"/>
  <text x="750" y="305"
        font-family="DejaVu Serif, serif"
        font-size="24" letter-spacing="12" font-weight="400"
        fill="#f5d77a" text-anchor="middle">REAL COUPLE</text>
  <line x1="870" y1="298" x2="1010" y2="298" stroke="url(#goldLine)" stroke-width="1.3"/>

  <!-- Tagline -->
  <text x="750" y="360"
        font-family="Liberation Sans, sans-serif"
        font-size="22" letter-spacing="8" font-weight="300"
        fill="#ffffff" text-anchor="middle" opacity="0.95">Authentic  ·  Explicit  ·  Exclusive</text>

  <!-- CTA -->
  <g transform="translate(750, 425)">
    <rect x="-175" y="-28" width="350" height="56" rx="28" ry="28"
          fill="#d4a84a" opacity="0.1"/>
    <rect x="-175" y="-28" width="350" height="56" rx="28" ry="28"
          fill="none" stroke="url(#goldText)" stroke-width="1.6"/>
    <text x="0" y="8"
          font-family="Liberation Sans, sans-serif"
          font-size="22" letter-spacing="7" font-weight="700"
          fill="url(#goldText)" text-anchor="middle">UNLOCK EVERYTHING</text>
  </g>
</svg>
